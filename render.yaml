services:
  - type: web
    name: ladenutricare-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://<your-frontend>.onrender.com,http://localhost:3000"
      - key: PYTHONUNBUFFERED
        value: "1"
